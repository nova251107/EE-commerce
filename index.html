      const [showLogin, setShowLogin] = useState(false);
      const [activeCategory, setActiveCategory] = useState("All");
      const [cartCount, setCartCount] = useState(0);

      const [user, setUser] = useState(null);
      const [cartItems, setCartItems] = useState([]);
      const [showCart, setShowCart] = useState(false);
      const [showCheckout, setShowCheckout] = useState(false);
      
      useEffect(() => {
        try {
            if (window.onAuthStateChanged && window.getAuth) {
                window.onAuthStateChanged(window.getAuth(), (u) => setUser(u));
            }
        } catch (e) {
            console.error("Firebase Auth not initialized correctly", e);
        }
      }, []);

      const handleLogin = async () => {
          if (!window.getAuth || !window.GoogleAuthProvider) return;
          const auth = window.getAuth();
          const provider = new window.GoogleAuthProvider();
          try {
              await window.signInWithPopup(auth, provider);
              setToast("Logged in successfully! 🎉");
              setShowLogin(false);
          } catch (e) {
              console.error(e);
              setToast("Login failed: " + e.message);
          }
      };
      
      const handleLogout = async () => {
          if (!window.getAuth) return;
          await window.signOut(window.getAuth());
          setToast("Logged out successfully");
      };

      const [toast, setToast] = useState(null);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      // ML Engine state
      const [featureVector, setFeatureVector] = useState(null);
      const [demandScore, setDemandScore] = useState(null);
      const [mlStats, setMlStats] = useState(null);
      const productsRef = useRef(null);
      const mlRef = useRef(null);

      // Init AOS
      useEffect(() => {
        AOS.init({ duration: 700, once: true, easing: "ease-out-cubic", offset: 60 });
        // GSAP scroll-triggered animations for stat numbers
        gsap.registerPlugin(ScrollTrigger);
      }, []);

      const scrollToProducts = () => {
        productsRef.current?.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      const simulateClick = useCallback(async () => {
        if (loading) return;
        setLoading(true);
        setSimCount((c) => c + 1);

        const randomProduct = products[Math.floor(Math.random() * products.length)];
        setSelectedId(randomProduct.id);

        // Event types to rotate through for realism
        const EVENT_TYPES = ["view", "click", "add_to_cart", "view", "click", "view"];
        const eventType = EVENT_TYPES[simCount % EVENT_TYPES.length];

        try {
          let newPrice = randomProduct.price;
          let mlData = null;

          // Try to find a real backend SKU
          const backendSkus = await getBackendSkus();
          const randomSku = backendSkus.length > 0
            ? backendSkus[Math.floor(Math.random() * Math.min(backendSkus.length, 50))]
            : null;

          // 1. POST /event → triggers full ML pipeline (primary path)
          if (randomSku) {
            try {
              const evRes = await fetch(
                `${API_BASE}/event?sku_id=${randomSku}&event_type=${eventType}&user_id=demo_user&session_id=demo_session`,
                { method: "POST" }
              );
              if (evRes.ok) {
                const evData = await evRes.json();
                newPrice = evData.new_price ?? newPrice;
                if (evData.feature_vector) setFeatureVector(evData.feature_vector);
                if (evData.demand_score) setDemandScore(evData.demand_score);
                mlData = evData;
              }
            } catch { /* fallback below */ }
          }

          // 2. Fallback: GET /price for price update
          if (!mlData) {
            try {
              const priceRes = await fetch(`${API_BASE}/price?product_id=${randomProduct.id}`);
              if (priceRes.ok) {
                const priceData = await priceRes.json();
                newPrice = priceData.price ?? newPrice;
                if (priceData.demand_score) setDemandScore(priceData.demand_score);
              }
            } catch {
              const delta = Math.random() * 0.2 - 0.05;
              newPrice = Math.round(randomProduct.price * (1 + delta));
            }
          }

          const priceUp = newPrice > randomProduct.price;
          const reasonStr = mlData && mlData.rationale ? mlData.rationale.join(" | ") : "";
          setLastAction(`${randomProduct.name}: ${formatPrice(randomProduct.price)} → ${formatPrice(newPrice)} ${priceUp ? "▲" : "▼"}${reasonStr ? ` — ${reasonStr}` : ""}`);

          setFlashStates((prev) => ({ ...prev, [randomProduct.id]: priceUp ? "up" : "down" }));
          setProducts((prev) => prev.map((p) => p.id === randomProduct.id ? { ...p, price: newPrice } : p));
          setTimeout(() => setFlashStates((prev) => ({ ...prev, [randomProduct.id]: null })), 2500);

          // 3. Fetch recommendations (normalise shape from backend or fallback)
          let newRecs = recommendations;
          try {
            const recRes = await fetch(`${API_BASE}/recommendations?user_id=demo_user&session_id=demo_session`);
            if (recRes.ok) {
              const recData = await recRes.json();
              const rawRecs = recData.recommendations ?? [];
              if (rawRecs.length > 0) {
                newRecs = rawRecs.map(normaliseRec);
              } else {
                newRecs = [...RECOMMENDATIONS].sort(() => Math.random() - 0.5).slice(0, 4);
              }
            }
          } catch {
            newRecs = [...RECOMMENDATIONS].sort(() => Math.random() - 0.5).slice(0, 4);
          }

          const freshIds = new Set(newRecs.map((r) => r.id).filter((id) => !recommendations.find((r) => r.id === id)));
          setRecommendations(newRecs);
          setNewRecIds(freshIds);
          setTimeout(() => setNewRecIds(new Set()), 3000);

          // 4. Refresh ML stats
          try {
            const statsRes = await fetch(`${API_BASE}/ml/status`);
            if (statsRes.ok) {
              const statsData = await statsRes.json();
              setMlStats(statsData);
            }
          } catch { /* silent */ }

        } finally {
          setLoading(false);
        }
      }, [products, recommendations, loading, simCount]);

      
      const handleCart = (product) => {
        setCartCount((c) => c + 1);
        setCartItems(prev => {
            const existing = prev.find(item => item.id === product.id);
            if (existing) {
                return prev.map(item => item.id === product.id ? {...item, qty: item.qty + 1} : item);
            }
            return [...prev, {...product, qty: 1}];
        });
        setToast(`${product.name} added to cart!`);
      };


      const filteredProducts = activeCategory === "All"
        ? products
        : products.filter((p) => p.category === activeCategory);

      const avgPrice = Math.round(products.reduce((s, p) => s + p.price, 0) / products.length);

      return (
        <div className="min-h-screen font-outfit" style={{ background: "#080810", color: "#fff" }}>

          {/* ── NAVIGATION ── */}
          <nav className="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-6 py-3.5"
            style={{ borderBottom: "1px solid rgba(255,255,255,0.05)", background: "rgba(8,8,16,0.88)", backdropFilter: "blur(20px)" }}>

            {/* Logo */}
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold"
                style={{ background: "linear-gradient(135deg, #a78bfa, #7c3aed)", color: "#080810" }}>◈</div>
              <span className="font-playfair text-lg" style={{ color: "#f8e2a4" }}>Smart Shop</span>
            </div>

            {/* Nav links — desktop */}
            <div className="hidden md:flex items-center gap-8">
              {["Home", "Products", "Deals", "About"].map((l) => (
                <a key={l} href={l === "Home" ? "#home" : l === "Products" ? "#products" : "#"} className="nav-link">{l}</a>
              ))}
            </div>

            {/* Right actions */}
            <div className="flex items-center gap-3">
              {lastAction && (
                <span className="text-[10px] font-mono hidden lg:inline" style={{ color: "rgba(255,255,255,0.3)", maxWidth: 240, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {lastAction}
                </span>
              )}

              {/* Sim counter */}
              <div className="text-right hidden sm:block">
                <p className="text-[9px] tracking-[0.1em] m-0 leading-none" style={{ color: "rgba(255,255,255,0.25)" }}>RUNS</p>
                <p className="text-base font-mono font-bold m-0 leading-tight" style={{ color: "#a78bfa" }}>{String(simCount).padStart(3, "0")}</p>
              </div>

              {/* Cart */}
              <div className="relative cursor-pointer" onClick={() => setShowCart(true)}>
                <div className="w-9 h-9 rounded-xl flex items-center justify-center text-lg"
                  style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)" }}>🛒</div>
                {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
              </div>

              {/* Login */}

              {user ? (
                  <div className="flex items-center gap-3">
                    <img src={user.photoURL} alt="User" className="w-8 h-8 rounded-full border border-neon" />
                    <button onClick={handleLogout} className="text-[12px] text-gray-400 hover:text-white bg-transparent border-none cursor-pointer">Logout</button>
                  </div>
              ) : (
                  <button
                    className="sim-btn hidden sm:flex rounded-xl px-4 py-2 text-[12px] font-semibold items-center gap-1.5 border-none"
                    onClick={() => setShowLogin(true)}
                    style={{ background: "rgba(255,255,255,0.05)", color: "#a78bfa", border: "1px solid rgba(167,139,250,0.25)", fontFamily: "Outfit,sans-serif", cursor: "pointer" }}
                  >
                    🔐 Login
                  </button>
              )}


              {/* Simulate */}
              <button
                id="simulate-btn"
                className="sim-btn rounded-xl px-4 py-2.5 text-[12px] font-semibold border-none flex items-center gap-2"
                onClick={simulateClick}
                disabled={loading}
                style={{
                  background: loading ? "rgba(226,185,111,0.1)" : "linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%)",
                  color: loading ? "rgba(226,185,111,0.5)" : "#080810",
                  cursor: loading ? "not-allowed" : "pointer",
                  fontFamily: "Outfit, sans-serif",
                }}
              >
                {loading && <div className="spinner" />}
                {loading ? "Processing…" : "⚡ Simulate"}
              </button>
            </div>
          </nav>

          {/* ── HERO ── */}
          <HeroSection onScrollToProducts={scrollToProducts} />

          {/* ── MARQUEE TICKER ── */}
          <div className="marquee-wrapper">
            <div className="marquee-track">
              {[...Array(2)].map((_, rep) =>
                ["🎧 Free Shipping Over ₹999", "⚡ Dynamic Pricing Active", "🤖 AI Recommendations Live", "🔥 Today's Deals — Up to 40% Off", "🚀 Same-Day Delivery Available", "💎 Premium Tech, Curated for You"].map((item, i) => (
                  <div key={`${rep}-${i}`} className="marquee-item">
                    <span>·</span> {item}
                  </div>
                ))
              )}
            </div>
          </div>

          {/* ── FEATURES ── */}
          <section className="py-20 px-6 max-w-screen-xl mx-auto" id="features">
            <div className="text-center mb-14" data-aos="fade-up">
              <span className="section-label">Why Smart Shop?</span>
              <h2 className="section-title">Built for the Modern Shopper</h2>
              <p className="mt-3 max-w-lg mx-auto" style={{ color: "rgba(255,255,255,0.4)", fontSize: 15, lineHeight: 1.7 }}>
                We combine AI, real-time data, and a curated catalog to give you an unmatched shopping experience.
              </p>
            </div>

            <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-5">
              {FEATURES.map((f, i) => (
                <div key={f.title} className="feature-card" data-aos="fade-up" data-aos-delay={i * 80}>
                  <div className="feature-icon" style={{ background: f.gradient }}>
                    {f.icon}
                  </div>
                  <h3 className="text-[15px] font-semibold text-white/90 mb-2">{f.title}</h3>
                  <p className="text-[13px] leading-relaxed m-0" style={{ color: "rgba(255,255,255,0.4)" }}>{f.desc}</p>
                </div>
              ))}
            </div>
          </section>

          <hr className="gradient-divider" />

          {/* ── PRODUCTS ── */}
          <section className="py-20 px-6 max-w-screen-xl mx-auto" ref={productsRef} id="products">
            <div className="flex flex-col lg:flex-row gap-8 items-start">

              {/* Main column */}
              <div className="flex-1 min-w-0">
                {/* Header */}
                <div className="flex items-end justify-between mb-6 flex-wrap gap-4" data-aos="fade-up">
                  <div>
                    <span className="section-label">Live Catalog</span>
                    <h2 className="section-title m-0">
                      {filteredProducts.length} {activeCategory !== "All" ? activeCategory : ""} Products
                    </h2>
                  </div>
                  <div className="flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full" style={{ background: "#4ade80", boxShadow: "0 0 6px rgba(74,222,128,0.8)" }} />
                    <span className="text-[11px] font-mono" style={{ color: "rgba(255,255,255,0.3)" }}>Dynamic pricing active</span>
                  </div>
                </div>

                {/* Category pills */}
                <div className="flex gap-2 mb-8 overflow-x-auto pb-2" data-aos="fade-up" data-aos-delay="80">
                  {CATEGORIES.map((cat) => (
                    <button
                      key={cat}
                      className={`category-pill ${activeCategory === cat ? "active" : ""}`}
                      onClick={() => setActiveCategory(cat)}
                    >
                      {cat}
                    </button>
                  ))}
                </div>

                {/* Grid */}
                <div className="grid gap-5" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(210px, 1fr))" }}>
                  {filteredProducts.map((product, i) => (
                    <div key={product.id} data-aos="fade-up" data-aos-delay={i * 50}>
                      <ProductCard
                        product={product}
                        isSelected={product.id === selectedId}
                        flashState={flashStates[product.id] ?? null}
                        onSelect={setSelectedId}
                        onCart={handleCart}
                      />
                    </div>
                  ))}
                </div>
              </div>

              {/* Sidebar */}
              <aside className="w-full lg:w-72 flex-shrink-0 sticky top-20" data-aos="fade-left" data-aos-delay="100">

                {/* AI Picks */}
                <div className="mb-4">
                  <span className="section-label" style={{ fontSize: 10 }}>AI-Powered</span>
                  <h3 className="text-[18px] font-semibold text-white m-0">Recommended for You</h3>
                </div>

                <div className="flex flex-col gap-2 mb-5">
                  {recommendations.map((rec, i) => (
                    <RecommendationCard key={rec.id} product={rec} isNew={newRecIds.has(rec.id)} />
                  ))}
                </div>

                {/* Stats grid */}
                <div className="grid grid-cols-2 gap-2 mb-4">
                  <StatBox label="AVG PRICE" value={formatPrice(avgPrice)} icon="📊" />
                  <StatBox label="UPDATES" value={simCount} icon="⚡" />
                  <StatBox label="PRODUCTS" value={products.length} icon="📦" />
                  <StatBox label="TRENDING" value={Object.values(flashStates).filter(v => v === "up").length} icon="🔥" />
                </div>

                {/* Live status */}
                <div className="rounded-xl px-3 py-3 flex items-center gap-2.5"
                  style={{ background: "rgba(74,222,128,0.04)", border: "1px solid rgba(74,222,128,0.12)" }}>
                  <div className="w-2 h-2 rounded-full flex-shrink-0"
                    style={{ background: "#4ade80", boxShadow: "0 0 6px rgba(74,222,128,0.8)" }} />
                  <div>
                    <p className="text-[11px] text-green-400/80 font-semibold m-0">Live simulation active</p>
                    <p className="text-[10px] m-0" style={{ color: "rgba(255,255,255,0.2)" }}>API fallback: mock mode</p>
                  </div>
                </div>

                {/* Deal of Day */}
                <div className="mt-4 rounded-2xl overflow-hidden" style={{ border: "1px solid rgba(226,185,111,0.2)" }}>
                  <img src={PRODUCTS[3].img} alt="Deal" className="w-full h-32 object-cover" />
                  <div className="p-4" style={{ background: "rgba(226,185,111,0.05)" }}>
                    <p className="text-[10px] font-bold tracking-[0.15em] text-neon m-0 mb-1">⏱ DEAL OF THE DAY</p>
                    <p className="text-[13px] font-semibold text-white/90 m-0">{PRODUCTS[3].name}</p>
                    <div className="flex items-center justify-between mt-2">
                      <span className="text-base font-bold font-mono" style={{ color: "#a78bfa" }}>{formatPrice(PRODUCTS[3].price)}</span>
                      <span className="text-[10px] font-bold text-green-400 bg-green-400/10 px-2 py-0.5 rounded">
                        SAVE {Math.round(((PRODUCTS[3].originalPrice - PRODUCTS[3].price) / PRODUCTS[3].originalPrice) * 100)}%
                      </span>
                    </div>
                  </div>
                </div>
              </aside>
            </div>
          </section>

          <hr className="gradient-divider" />

          {/* ── 🧠 ML FEATURE ENGINE DASHBOARD ── */}
          <section className="py-20 px-6 max-w-screen-xl mx-auto" id="ml-dashboard" ref={mlRef}>
            <div className="text-center mb-14" data-aos="fade-up">
              <span className="section-label" style={{ color: "#10b981" }}>Real-Time ML Engine</span>
              <h2 className="section-title">Feature Engine Dashboard</h2>
              <p className="mt-3 max-w-lg mx-auto" style={{ color: "rgba(255,255,255,0.4)", fontSize: 15, lineHeight: 1.7 }}>
                Live session features, demand prediction scores, and streaming pipeline metrics — all updating in real time.
              </p>
            </div>

            <div className="grid lg:grid-cols-3 gap-6">

              {/* ── Feature Vector Panel ── */}
              <div className="lg:col-span-2 fe-panel" data-aos="fade-up">
                <div className="flex items-center gap-3 mb-6">
                  <div className="ml-live-dot" />
                  <div>
                    <p className="text-[13px] font-bold text-white/90 m-0">Session Feature Vector</p>
                    <p className="text-[10px] m-0" style={{ color: "rgba(255,255,255,0.3)" }}>session: demo_session · user: demo_user</p>
                  </div>
                  <span className="ml-auto text-[10px] font-mono" style={{ color: "#10b981" }}>
                    {featureVector ? `${featureVector.latency_ms?.toFixed(1) ?? "—"}ms` : (simCount > 0 ? "waiting…" : "click ⚡ Simulate")}
                  </span>
                </div>

                {/* Metrics grid */}
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
                  <div className="fe-metric">
                    <span className="fe-metric-label">Intent Score</span>
                    <span className="fe-metric-value">{featureVector ? featureVector.intent_score?.toFixed(1) : "—"}</span>
                    <span className="fe-metric-sub">weighted action sum</span>
                  </div>
                  <div className="fe-metric">
                    <span className="fe-metric-label">Price Sensitivity</span>
                    <span className="fe-metric-value" style={{ color: featureVector && featureVector.price_sensitivity > 0.5 ? "#f87171" : "#a78bfa" }}>
                      {featureVector ? (featureVector.price_sensitivity * 100).toFixed(0) + "%" : "—"}
                    </span>
                    <span className="fe-metric-sub">discount interaction ratio</span>
                  </div>
                  <div className="fe-metric">
                    <span className="fe-metric-label">Session Duration</span>
                    <span className="fe-metric-value" style={{ fontSize: 18 }}>
                      {featureVector ? (featureVector.session_duration_s < 60
                        ? featureVector.session_duration_s?.toFixed(0) + "s"
                        : (featureVector.session_duration_s / 60).toFixed(1) + "m") : "—"}
                    </span>
                    <span className="fe-metric-sub">real-time elapsed</span>
                  </div>
                  <div className="fe-metric">
                    <span className="fe-metric-label">Cart Events</span>
                    <span className="fe-metric-value" style={{ color: "#4ade80" }}>
                      {featureVector ? featureVector.cart_count : "—"}
                    </span>
                    <span className="fe-metric-sub">add-to-cart actions</span>
                  </div>
                </div>

                {/* Action history */}
                <div className="mb-4">
                  <p className="text-[10px] font-bold tracking-[0.14em] uppercase mb-2" style={{ color: "rgba(255,255,255,0.3)" }}>Last {featureVector?.last_actions?.length ?? 0} Actions (rolling window)</p>
                  <div className="flex flex-wrap gap-1.5">
                    {featureVector?.last_actions?.length > 0
                      ? featureVector.last_actions.map((a, i) => {
                        const cls = a.includes("cart") ? "action-chip-cart"
                          : a.includes("purchase") ? "action-chip-purchase"
                            : a.includes("click") ? "action-chip-click"
                              : a.includes("view") ? "action-chip-view"
                                : "action-chip-default";
                        return <span key={i} className={`action-chip ${cls}`}>{a}</span>;
                      })
                      : <span className="text-[11px]" style={{ color: "rgba(255,255,255,0.2)" }}>No actions recorded yet — click ⚡ Simulate to generate events</span>
                    }
                  </div>
                </div>

                {/* Active category */}
                {featureVector?.active_category && (
                  <div className="flex items-center gap-2 mt-2">
                    <span className="text-[10px]" style={{ color: "rgba(255,255,255,0.3)" }}>Most-browsed category:</span>
                    <span className="text-[11px] font-semibold" style={{ color: "#a78bfa" }}>{featureVector.active_category}</span>
                  </div>
                )}
              </div>

              {/* ── Streaming Stats Panel ── */}
              <div className="flex flex-col gap-4" data-aos="fade-up" data-aos-delay="100">

                {/* ML Status */}
                <div className="fe-panel" style={{ padding: 20 }}>
                  <div className="flex items-center gap-2 mb-4">
                    <span style={{ fontSize: 18 }}>🤖</span>
                    <p className="text-[13px] font-bold text-white/90 m-0">ML Engine Status</p>
                    {mlStats?.ml_ready && <span className="ml-auto text-[9px] font-bold px-2 py-0.5 rounded-full" style={{ background: "rgba(16,185,129,0.15)", color: "#10b981", border: "1px solid rgba(16,185,129,0.3)" }}>LIVE</span>}
                    {!mlStats?.ml_ready && mlStats && <span className="ml-auto text-[9px] font-bold px-2 py-0.5 rounded-full" style={{ background: "rgba(234,179,8,0.15)", color: "#facc15", border: "1px solid rgba(234,179,8,0.3)" }}>HEURISTIC</span>}
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    {[
                      ["Events/sec", mlStats?.events_per_sec?.toFixed(1) ?? "0.0", "⚡"],
                      ["Avg Latency", (mlStats?.avg_latency_ms?.toFixed(1) ?? "0") + "ms", "⏱"],
                      ["Sessions", mlStats?.active_sessions ?? 0, "👤"],
                      ["Events", mlStats?.events_processed ?? 0, "📊"],
                    ].map(([label, val, icon]) => (
                      <div key={label} className="fe-metric" style={{ padding: "10px 12px" }}>
                        <span className="fe-metric-label">{icon} {label}</span>
                        <span className="fe-metric-value" style={{ fontSize: 16 }}>{val}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Demand Score Panel */}
                <div className="fe-panel" style={{ padding: 20 }}>
                  <div className="flex items-center gap-2 mb-4">
                    <span style={{ fontSize: 18 }}>📈</span>
                    <p className="text-[13px] font-bold text-white/90 m-0">Product Demand Score</p>
                  </div>
                  {demandScore ? (
                    <>
                      <div className="mb-3">
                        <div className="flex items-center justify-between mb-1.5">
                          <span className="text-[10px]" style={{ color: "rgba(255,255,255,0.4)" }}>Hybrid Score (ML + Heuristic)</span>
                          <span className="text-[13px] font-bold font-mono" style={{
                            color:
                              demandScore.demand_score > 60 ? "#f87171" :
                                demandScore.demand_score > 30 ? "#facc15" : "#4ade80"
                          }}>
                            {demandScore.demand_score?.toFixed(1)}
                          </span>
                        </div>
                        <div className="demand-bar">
                          <div className="demand-bar-fill" style={{
                            width: `${Math.min(demandScore.demand_score, 100)}%`,
                            background: demandScore.demand_score > 60
                              ? "linear-gradient(90deg, #f97316, #ef4444)"
                              : demandScore.demand_score > 30
                                ? "linear-gradient(90deg, #eab308, #f97316)"
                                : "linear-gradient(90deg, #22c55e, #16a34a)"
                          }} />
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-2 text-[10px]">
                        <div style={{ color: "rgba(255,255,255,0.4)" }}>⚙ Heuristic: <span style={{ color: "#a78bfa" }}>{demandScore.heuristic_score?.toFixed(1)}</span></div>
                        <div style={{ color: "rgba(255,255,255,0.4)" }}>🤖 ML: <span style={{ color: "#a78bfa" }}>{demandScore.ml_score?.toFixed(1)}</span></div>
                        <div style={{ color: "rgba(255,255,255,0.4)" }}>🖱 Clicks/60s: <span style={{ color: "#60a5fa" }}>{demandScore.click_velocity_60s?.toFixed(1)}</span></div>
                        <div style={{ color: "rgba(255,255,255,0.4)" }}>🛒 Carts/60s: <span style={{ color: "#facc15" }}>{demandScore.cart_velocity_60s?.toFixed(1)}</span></div>
                      </div>
                      {demandScore.trending && (
                        <div className="mt-3 flex items-center gap-1.5 text-[10px] font-bold" style={{ color: "#f87171" }}>
                          🔥 Trending — demand spiking!
                        </div>
                      )}
                    </>
                  ) : (
                    <p className="text-[11px] m-0" style={{ color: "rgba(255,255,255,0.2)" }}>Simulate an event to see demand prediction</p>
                  )}
                </div>

                {/* Pipeline latency indicator */}
                <div className="fe-panel" style={{ padding: 16, background: "rgba(124,58,237,0.05)", borderColor: "rgba(124,58,237,0.15)" }}>
                  <p className="text-[10px] font-bold tracking-[0.12em] uppercase mb-2" style={{ color: "#a78bfa" }}>End-to-End Pipeline</p>
                  <div className="flex items-center gap-3">
                    <span className="text-2xl font-bold font-mono" style={{ color: simCount > 0 ? "#a78bfa" : "rgba(255,255,255,0.2)" }}>
                      {mlStats?.avg_latency_ms ? `${mlStats.avg_latency_ms.toFixed(0)}ms` : "—"}
                    </span>
                    <div>
                      <p className="text-[10px] m-0 font-semibold" style={{ color: "rgba(255,255,255,0.5)" }}>Avg latency</p>
                      <p className="text-[9px] m-0" style={{ color: "rgba(255,255,255,0.25)" }}>Target &lt; 200ms</p>
                    </div>
                    {mlStats?.avg_latency_ms && mlStats.avg_latency_ms < 200 && (
                      <span className="ml-auto text-[9px] font-bold px-2 py-0.5 rounded-full" style={{ background: "rgba(16,185,129,0.15)", color: "#10b981", border: "1px solid rgba(16,185,129,0.3)" }}>✓ ON TARGET</span>
                    )}
                  </div>
                  <div className="grid grid-cols-3 gap-1 mt-3 text-center">
                    {["StreamProcessor", "FeatureEngine", "DemandPredictor"].map(c => (
                      <div key={c} style={{ background: "rgba(124,58,237,0.1)", borderRadius: 8, padding: "6px 4px" }}>
                        <p className="text-[8px] m-0" style={{ color: "#a78bfa" }}>{c.replace(/(.)([A-Z])/g, '$1\n$2')}</p>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            </div>
          </section>

          {/* ── TESTIMONIALS ── */}
          <section className="py-20 px-6 max-w-screen-xl mx-auto" id="testimonials">
            <div className="text-center mb-14" data-aos="fade-up">
              <span className="section-label">Social Proof</span>
              <h2 className="section-title">What Our Customers Say</h2>
            </div>

            <div className="grid sm:grid-cols-3 gap-6">
              {TESTIMONIALS.map((t, i) => (
                <div key={t.name} className="testimonial-card" data-aos="fade-up" data-aos-delay={i * 100}>
                  <div className="flex items-center gap-3 mb-4">
                    <img src={t.avatar} alt={t.name} className="w-11 h-11 rounded-full object-cover" />
                    <div>
                      <p className="text-[13px] font-semibold text-white/90 m-0">{t.name}</p>
                      <p className="text-[11px] m-0" style={{ color: "rgba(255,255,255,0.35)" }}>{t.role}</p>
                    </div>
                    <div className="ml-auto">
                      <Stars count={t.stars} />
                    </div>
                  </div>
                  <p className="text-[13px] leading-relaxed m-0" style={{ color: "rgba(255,255,255,0.55)" }}>"{t.text}"</p>
                </div>
              ))}
            </div>
          </section>


          {/* ── PHASE 6: Simulation + Explainability ── */}
          <section className="py-20 px-6 max-w-screen-xl mx-auto" id="simulation">
            <div className="text-center mb-14" data-aos="fade-up">
              <span className="section-label">Phase 6 — Step 22 · 23 · 24</span>
              <h2 className="section-title">Price Simulation &amp; Explainability Engine</h2>
              <p className="text-[14px] mt-3" style={{ color: "rgba(255,255,255,0.4)", maxWidth: 560, margin: "12px auto 0" }}>
                See how the AI dynamically adjusts prices across all demand × inventory scenarios.
              </p>
            </div>
            <SimulationPanel API_BASE={API_BASE} />
            <div className="mt-14 grid sm:grid-cols-2 lg:grid-cols-3 gap-5" data-aos="fade-up">
              {[
                { icon: "⚡", challenge: "C1: Data Delay", solution: "Real-time streaming features only — no historical lag", color: "#a78bfa" },
                { icon: "🎯", challenge: "C2: Overfitting", solution: "Simple linear models (logistic + scoring) — 3 features max", color: "#a78bfa" },
                { icon: "🚀", challenge: "C3: Latency", solution: "Precomputed weights → inference in <1ms per request", color: "#34d399" },
                { icon: "🌟", challenge: "C4: Cold Start", solution: "Trending + device + time-of-day signals for new users", color: "#60a5fa" },
                { icon: "🛡️", challenge: "C5: Unstable Prices", solution: "Hard ±15% guardrails enforced on every decision", color: "#f87171" },
                { icon: "✅", challenge: "Step 24: Final System", solution: "Real-time pricing · Smart recs · <50ms latency · Explainable", color: "#2ed573" },
              ].map((c, i) => (
                <div key={c.challenge} data-aos="fade-up" data-aos-delay={i * 80}
                  style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 16, padding: "20px 22px", transition: "all 0.3s" }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = c.color + "55"; e.currentTarget.style.background = c.color + "0A"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.07)"; e.currentTarget.style.background = "rgba(255,255,255,0.025)"; }}>
                  <div className="flex items-center gap-3 mb-3">
                    <span className="text-2xl">{c.icon}</span>
                    <span className="text-[11px] font-bold tracking-widest uppercase" style={{ color: c.color }}>{c.challenge}</span>
                  </div>
                  <p className="text-[13px] leading-relaxed m-0" style={{ color: "rgba(255,255,255,0.65)" }}>{c.solution}</p>
                </div>
              ))}
            </div>
          </section>

          <hr className="gradient-divider" />

          {/* ── FOOTER ── */}
          <footer className="py-12 px-6 max-w-screen-xl mx-auto">
            <div className="flex flex-col md:flex-row items-center justify-between gap-6">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold"
                  style={{ background: "linear-gradient(135deg, #a78bfa, #7c3aed)", color: "#080810" }}>◈</div>
                <span className="font-playfair text-lg" style={{ color: "#f8e2a4" }}>Smart Shop</span>
              </div>

              <div className="flex flex-wrap gap-6 justify-center">
                {["Privacy Policy", "Terms of Service", "Shipping", "Returns", "Contact Us"].map((l) => (
                  <a key={l} href="#" className="footer-link">{l}</a>
                ))}
              </div>

              <p className="text-[12px] m-0" style={{ color: "rgba(255,255,255,0.2)" }}>
                © 2026 Smart Shop. All rights reserved.
              </p>
            </div>
          </footer>

          {/* ── LOGIN MODAL ── */}
          {showLogin && (
            <div className="fixed inset-0 z-50 flex items-center justify-center"
              style={{ background: "rgba(8,8,16,0.85)", backdropFilter: "blur(12px)" }}>
              <div className="rounded-2xl p-8 max-w-md w-full mx-4 relative"
                style={{ background: "rgba(15,15,25,0.97)", border: "1px solid rgba(255,255,255,0.08)", boxShadow: "0 32px 80px rgba(0,0,0,0.7)" }}>
                <button onClick={() => setShowLogin(false)}
                  className="absolute top-4 right-4"
                  style={{ color: "rgba(255,255,255,0.3)", background: "none", border: "none", cursor: "pointer", fontSize: 18 }}>✕</button>

                
                <div className="text-center mb-7">
                  <div className="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl"
                    style={{ background: "linear-gradient(135deg, #a78bfa, #7c3aed)" }}>🔐</div>
                  <h2 className="text-xl font-playfair m-0 mb-1" style={{ color: "#a78bfa" }}>Welcome Back</h2>
                  <p className="text-[13px] m-0" style={{ color: "rgba(255,255,255,0.4)" }}>Sign in to your Smart Shop account</p>
                </div>

                <div className="space-y-4">
                  <button onClick={handleLogin} className="w-full py-3 rounded-xl font-semibold text-[13px] tracking-wide border-none cursor-pointer transition-all flex items-center justify-center gap-2"
                    style={{ background: "linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%)", color: "#030014", fontFamily: "Outfit, sans-serif" }}>
                    <svg className="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.761H12.545z"/></svg>
                    Sign in with Google
                  </button>
                </div>

              </div>
            </div>
          )}

          
          {/* ── CART MODAL ── */}
          {showCart && (
              <div className="fixed inset-0 z-50 flex" style={{ background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)" }}>
                <div className="ml-auto w-full max-w-md h-full flex flex-col" style={{ background: "#0a0a18", borderLeft: "1px solid rgba(255,255,255,0.1)", animation: "slideIn 0.3s ease-out" }}>
                  <div className="flex items-center justify-between p-6 border-b border-white/10">
                    <h2 className="text-xl font-bold text-neon m-0">Your Cart</h2>
                    <button onClick={() => setShowCart(false)} className="text-gray-400 hover:text-white bg-transparent border-none text-xl cursor-pointer">✕</button>
                  </div>
                  <div className="flex-1 overflow-y-auto p-6 space-y-4">
                    {cartItems.length === 0 ? (
                        <p className="text-gray-400 text-center mt-10">Your cart is empty.</p>
                    ) : (
                        cartItems.map(item => (
                            <div key={item.id} className="flex gap-4 items-center bg-white/5 p-3 rounded-xl border border-white/10">
                                <img src={item.img} alt={item.name} className="w-16 h-16 object-cover rounded-lg" />
                                <div className="flex-1">
                                    <h4 className="text-sm font-semibold text-white m-0">{item.name}</h4>
                                    <p className="text-neon text-sm m-0">${item.price}</p>
                                </div>
                                <div className="text-sm font-mono bg-black/30 px-3 py-1 rounded-md text-gray-300">x{item.qty}</div>
                            </div>
                        ))
                    )}
                  </div>
                  <div className="p-6 border-t border-white/10 bg-black/20">
                    <div className="flex justify-between text-lg font-bold text-white mb-4">
                        <span>Total:</span>
                        <span>${cartItems.reduce((acc, item) => acc + (item.price * item.qty), 0).toFixed(2)}</span>
                    </div>
                    <button 
                        onClick={() => { setShowCart(false); setShowCheckout(true); }}
                        disabled={cartItems.length === 0}
                        className="w-full py-3 rounded-xl font-semibold text-black cursor-pointer disabled:opacity-50 border-none"
                        style={{ background: "linear-gradient(135deg, #a78bfa, #22d3ee)" }}>
                        Proceed to Checkout
                    </button>
                  </div>
                </div>
              </div>
          )}

          {/* ── STRIPE MOCK MODAL ── */}
          {showCheckout && (
             <div className="fixed inset-0 z-50 flex items-center justify-center" style={{ background: "rgba(8,8,16,0.85)", backdropFilter: "blur(12px)" }}>
                <div className="rounded-2xl p-8 max-w-md w-full mx-4 relative bg-white text-black shadow-2xl">
                    <button onClick={() => setShowCheckout(false)} className="absolute top-4 right-4 text-gray-500 bg-transparent border-none text-xl cursor-pointer">✕</button>
                    <div className="text-center mb-6">
                        <div className="w-12 h-12 bg-indigo-600 text-white rounded-full flex items-center justify-center mx-auto mb-3 text-xl font-bold">S</div>
                        <h2 className="text-2xl font-bold m-0">Stripe Mock</h2>
                        <p className="text-gray-500 text-sm m-0">Test mode payment</p>
                    </div>
                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6">
                        <p className="text-gray-600 text-sm mb-1 m-0">Amount due</p>
                        <p className="text-3xl font-bold text-black m-0">${cartItems.reduce((acc, item) => acc + (item.price * item.qty), 0).toFixed(2)}</p>
                    </div>
                    <div className="space-y-4">
                        <input type="text" placeholder="Card Number" defaultValue="4242 4242 4242 4242" className="w-full px-4 py-3 rounded-lg border border-gray-300 font-mono text-gray-700 outline-none focus:border-indigo-500" />
                        <div className="flex gap-4">
                            <input type="text" placeholder="MM / YY" defaultValue="12 / 28" className="w-1/2 px-4 py-3 rounded-lg border border-gray-300 font-mono text-gray-700 outline-none focus:border-indigo-500" />
                            <input type="text" placeholder="CVC" defaultValue="123" className="w-1/2 px-4 py-3 rounded-lg border border-gray-300 font-mono text-gray-700 outline-none focus:border-indigo-500" />
                        </div>
                        <button onClick={() => {
                            setToast("Payment successful! 🎉");
                            setCartItems([]);
                            setCartCount(0);
                            setShowCheckout(false);
                        }} className="w-full py-4 bg-indigo-600 text-white rounded-lg font-bold text-lg border-none cursor-pointer hover:bg-indigo-700 transition-colors">
                            Pay Now
                        </button>
                    </div>
                </div>
             </div>
          )}

          {/* ── TOAST ── */}
          {toast && <Toast message={toast} onClose={() => setToast(null)} />}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>

</html>
