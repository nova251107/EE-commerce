<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Shop — Dynamic Pricing Engine</title>
  <meta name="description"
    content="Premium tech products with real-time dynamic pricing and AI-powered recommendations" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            outfit: ["Outfit", "sans-serif"],
            playfair: ["Playfair Display", "serif"],
            mono: ["DM Mono", "monospace"],
          },
          colors: {
            neon: { DEFAULT: "#a78bfa", dark: "#7c3aed", light: "#d8b4fe" },
            cyan: { DEFAULT: "#22d3ee" },
            surface: { DEFAULT: "#030014", card: "rgba(255,255,255,0.03)", border: "rgba(255,255,255,0.07)" },
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'shimmer': 'shimmer 2s linear infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
          }
        },
      },
    };
  </script>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- AOS — Animate on Scroll -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    
    // Initialize Firebase with a dummy config so the app doesn't crash.
    // The user MUST replace this with their actual Firebase config.
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    
    const app = initializeApp(firebaseConfig);
    
    window.getAuth = getAuth;
    window.signInWithPopup = signInWithPopup;
    window.GoogleAuthProvider = GoogleAuthProvider;
    window.onAuthStateChanged = onAuthStateChanged;
    window.signOut = signOut;
  </script>

  <!-- GSAP for advanced animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --neon: #a78bfa;
      --neon-dark: #7c3aed;
      --neon-light: #d8b4fe;
      --cyan: #22d3ee;
      --bg: #030014;
      --card-bg: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --glass-bg: rgba(10, 10, 25, 0.6);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      overflow-x: hidden;
      font-family: 'Outfit', sans-serif;
      color: #fff;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(226, 185, 111, 0.25);
      border-radius: 4px;
    }

    /* ── Three.js Canvas ── */
    #three-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Hero ── */
    .hero-section {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(226, 185, 111, 0.12) 0%, transparent 70%),
        linear-gradient(180deg, #080810 0%, #0a0a18 100%);
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(226, 185, 111, 0.08);
      border: 1px solid rgba(226, 185, 111, 0.25);
      border-radius: 99px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--neon-light);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      backdrop-filter: blur(8px);
    }

    .hero-badge .dot {
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.8);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(0.85);
      }
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, var(--neon) 70%, var(--neon-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      border: none;
      outline: none;
    }

    .hero-cta-primary {
      background: linear-gradient(135deg, var(--neon) 0%, var(--neon-dark) 100%);
      color: #080810;
      box-shadow: 0 8px 32px rgba(226, 185, 111, 0.35);
    }

    .hero-cta-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(226, 185, 111, 0.45);
    }

    .hero-cta-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
    }

    .hero-cta-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
    }

    /* ── Floating stats in hero ── */
    .hero-stat-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px 20px;
      backdrop-filter: blur(20px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(226, 185, 111, 0.4), transparent);
    }

    /* ── Marquee ── */
    .marquee-wrapper {
      overflow: hidden;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.015);
      padding: 14px 0;
    }

    .marquee-track {
      display: flex;
      gap: 60px;
      animation: marquee 30s linear infinite;
      width: max-content;
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    .marquee-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .marquee-item span {
      color: var(--neon);
      font-size: 16px;
    }

    /* ── Section ── */
    .section-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 10px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      background: linear-gradient(135deg, #fff 60%, rgba(255, 255, 255, 0.6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Product Card (upgraded) ── */
    .product-card {
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        border-color 0.3s ease,
        box-shadow 0.4s ease;
      cursor: pointer;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-8px) scale(1.01);
      border-color: rgba(226, 185, 111, 0.4);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(226, 185, 111, 0.15), 0 8px 32px rgba(226, 185, 111, 0.12);
    }

    .product-img-wrapper {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
    }

    .product-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .product-card:hover .product-img-wrapper img {
      transform: scale(1.08);
    }

    .product-img-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(8, 8, 16, 0.85) 0%, rgba(8, 8, 16, 0.2) 40%, transparent 70%);
    }

    .product-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 99px;
      backdrop-filter: blur(12px);
    }

    .product-badge-selected {
      background: rgba(226, 185, 111, 0.9);
      color: #080810;
    }

    .product-badge-hot {
      background: rgba(239, 68, 68, 0.85);
      color: #fff;
    }

    .product-badge-new {
      background: rgba(74, 222, 128, 0.85);
      color: #080810;
    }

    .product-wishlist {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .product-wishlist:hover {
      background: rgba(255, 60, 60, 0.25);
      transform: scale(1.1);
    }

    .product-category-tag {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
    }

    .add-to-cart-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, var(--neon) 0%, var(--neon-dark) 100%);
      color: #080810;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .add-to-cart-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .add-to-cart-btn:active {
      transform: scale(0.98);
    }

    /* ── Price animations ── */
    @keyframes priceUp {
      0% {
        transform: scale(1.25);
        color: #4ade80;
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes priceDown {
      0% {
        transform: scale(1.25);
        color: #f87171;
      }

      100% {
        transform: scale(1);
      }
    }

    .price-flash-up {
      animation: priceUp 0.5s ease-out;
    }

    .price-flash-down {
      animation: priceDown 0.5s ease-out;
    }

    @keyframes flashGreen {
      0% {
        box-shadow: inset 0 0 0 2px rgba(74, 222, 128, 0.7);
      }

      100% {
        box-shadow: inset 0 0 0 2px transparent;
      }
    }

    @keyframes flashRed {
      0% {
        box-shadow: inset 0 0 0 2px rgba(248, 113, 113, 0.7);
      }

      100% {
        box-shadow: inset 0 0 0 2px transparent;
      }
    }

    .flash-up {
      animation: flashGreen 2.5s ease-out;
    }

    .flash-down {
      animation: flashRed 2.5s ease-out;
    }

    /* ── Spinner ── */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(226, 185, 111, 0.2);
      border-top-color: var(--neon);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Sim buttons ── */
    .sim-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .sim-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sim-btn:hover::after {
      opacity: 1;
    }

    .sim-btn:active {
      transform: scale(0.96) !important;
    }

    /* ── Rec card ── */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(16px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .rec-new {
      animation: slideIn 0.45s ease-out;
    }

    /* ── Trending ── */
    @keyframes pulse-trend {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    .trending-badge {
      animation: pulse-trend 1.8s ease-in-out infinite;
    }

    /* ── Nav ── */
    .nav-link {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      padding: 4px 0;
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--neon);
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }

    .nav-link:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    .nav-link:hover::after {
      transform: scaleX(1);
    }

    /* ── Category pills ── */
    .category-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .category-pill:hover,
    .category-pill.active {
      background: rgba(226, 185, 111, 0.1);
      border-color: rgba(226, 185, 111, 0.35);
      color: var(--neon);
    }

    /* ── Features Section ── */
    .feature-card {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 32px;
      position: relative;
      overflow: hidden;
      transition: all 0.35s ease;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(226, 185, 111, 0.3), transparent);
      opacity: 0;
      transition: opacity 0.35s;
    }

    .feature-card:hover {
      border-color: rgba(226, 185, 111, 0.2);
      transform: translateY(-4px);
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    /* ── Testimonial ── */
    .testimonial-card {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 20px;
      padding: 28px;
      transition: all 0.3s ease;
    }

    .testimonial-card:hover {
      border-color: rgba(226, 185, 111, 0.2);
      transform: translateY(-4px);
    }

    /* ── Footer ── */
    .footer-link {
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }

    .footer-link:hover {
      color: var(--neon);
    }

    /* ── Glassmorphism panel ── */
    .glass-panel {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
    }

    /* ── Number counter animation ── */
    .count-up {
      display: inline-block;
    }

    /* ── Gradient divider ── */
    .gradient-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(226, 185, 111, 0.25), transparent);
      border: none;
      margin: 0;
    }

    /* ── Cart badge ── */
    .cart-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: var(--neon);
      color: #080810;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      background: rgba(15, 15, 25, 0.95);
      border: 1px solid rgba(226, 185, 111, 0.3);
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      animation: toastIn 0.35s ease-out;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toast-icon {
      font-size: 18px;
    }

    /* ── Feature Engine Dashboard ── */
    .fe-panel {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .fe-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #7c3aed, #a78bfa, #10b981);
    }

    .fe-metric {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
    }

    .fe-metric-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    .fe-metric-value {
      font-size: 22px;
      font-weight: 800;
      font-family: 'DM Mono', monospace;
      color: #a78bfa;
      line-height: 1;
    }

    .fe-metric-sub {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.25);
    }

    .demand-bar {
      height: 6px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
      position: relative;
    }

    .demand-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes pulse-ml {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .ml-live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.8);
      animation: pulse-ml 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    .action-chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .action-chip-view {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;

    const TESTIMONIALS = [

    ];

    /* ─────────────── UTILS ─────────────── */

    function formatPrice(n) {
      return "₹" + Number(n).toLocaleString("en-IN");
    }

    // Normalise recommendation shape from backend or fallback
    function normaliseRec(r) {
      return {
        id: r.sku_id || r.id,
        name: r.name,
        price: r.price ?? r.current_price ?? 0,
        img: r.img || `https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200&q=70&auto=format&fit=crop`,

    }

    function Stars({ count }) {
      return (
        <span style={{ color: "#fbbf24", fontSize: 13 }}>
          {"★".repeat(count)}{"☆".repeat(5 - count)}
        </span>
      );
    }


    /* ─────────────── PHASE 6: SimulationPanel ─────────────── */
    function SimulationPanel({ API_BASE }) {
      const [simData, setSimData] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      const [basePrice, setBasePrice] = React.useState(1000);
      const [customResult, setCustomResult] = React.useState(null);
      const [demand, setDemand] = React.useState(70);
      const [inventory, setInventory] = React.useState(15);
      const [intent, setIntent] = React.useState(8);
      const [selectedExp, setSelectedExp] = React.useState(null);

      const TIER_COLORS = {
        surge: "#ff4757", high: "#ff6b35", normal: "#2ed573",
        low: "#1e90ff", clearance: "#a29bfe", hold: "#74b9ff"
      };

      async function runMatrix() {
        setLoading(true);
        try {
          const r = await fetch(`${API_BASE}/simulate?base_price=${basePrice}`);
          if (r.ok) setSimData(await r.json());
        } catch (e) {
          /* fallback demo data */
          const fp = (base, adj) => Math.round(base * (1 + adj / 100) * 100) / 100;
          setSimData({
            base_price: basePrice, scenarios: [
              { scenario_label: "High Demand, Low Stock", demand_score: 82, inventory: 8, adjustment_pct: 15.0, final_price: fp(basePrice, 15), tier: "surge", reasons: ["📈 Surge demand: +15%", "🔥 Low stock: +3%"] },
              { scenario_label: "High Demand, High Stock", demand_score: 75, inventory: 800, adjustment_pct: 8.1, final_price: fp(basePrice, 8.1), tier: "high", reasons: ["📈 High demand: +8.1%", "📦 Surplus dampens: -2%"] },
              { scenario_label: "Low Demand, High Stock", demand_score: 18, inventory: 700, adjustment_pct: -28.8, final_price: fp(basePrice, -28.8), tier: "clearance", reasons: ["📉 Low demand: -24.5%", "📦 Surplus: -5%"] },
              { scenario_label: "Low Demand, Low Stock", demand_score: 22, inventory: 12, adjustment_pct: -1.2, final_price: fp(basePrice, -1.2), tier: "hold", reasons: ["💎 Value hold: margin protected", "🔥 Low stock offsets"] },
              { scenario_label: "Medium Demand, Normal", demand_score: 50, inventory: 150, adjustment_pct: 0.8, final_price: fp(basePrice, 0.8), tier: "normal", reasons: ["⚖️ Balanced: +0.8%"] },
              { scenario_label: "Surge + Critical Stock", demand_score: 95, inventory: 3, adjustment_pct: 15.0, final_price: fp(basePrice, 15), tier: "surge", reasons: ["🚨 Critical stock: +5%", "📈 Surge demand: +17%"] },
            ]
          });
        }
        setLoading(false);
      }

      async function runCustom() {
        setLoading(true);
        try {
          const r = await fetch(
            `${API_BASE}/simulate/custom?base_price=${basePrice}&demand_score=${demand}&inventory=${inventory}&user_intent=${intent}`,
            { method: "POST" }
          );
          if (r.ok) setCustomResult(await r.json());
          else throw new Error("API error");
        } catch {
          const adj = (demand > 60 ? 10 : demand < 30 ? -20 : 2) + (inventory < 20 ? 3 : inventory > 400 ? -5 : 0);
          const fp = Math.round(basePrice * (1 + adj / 100) * 100) / 100;
          setCustomResult({
            base_price: basePrice, final_price: fp, adjustment_pct: adj,
            tier: demand > 60 ? "high" : demand < 30 ? "clearance" : "normal",
            reasons: [`Demand ${demand}/100`, `Inventory ${inventory} units`, `Intent ${intent}`],
            explanation: {
              headline: `Price ${adj >= 0 ? "↑" : "↓"} ${Math.abs(adj).toFixed(1)}% based on demand ${demand}/100 and stock ${inventory}`,
              badge: demand > 60 ? "📈 High Demand" : demand < 30 ? "🏷️ Low Demand" : "⚖️ Balanced",
              badge_color: demand > 60 ? "#ff6b35" : demand < 30 ? "#70a1ff" : "#2ed573",
              factors: [
                { icon: "📊", label: "Demand", value: `${demand}/100`, impact: demand > 50 ? "positive" : "negative", color: demand > 50 ? "#ff6b35" : "#1e90ff" },
                { icon: "📦", label: "Inventory", value: `${inventory} units`, impact: inventory < 50 ? "positive" : "inventory>300" ? "negative" : "neutral", color: inventory < 20 ? "#ff4757" : "#2ed573" },
                { icon: "🎯", label: "Intent Score", value: `${intent}`, impact: "neutral", color: "#a78bfa" },
              ],
              summary: `ML engine adjusted price from $${basePrice} to $${fp} (${adj >= 0 ? "+" : ""}${adj.toFixed(1)}%) based on demand score ${demand}/100 and ${inventory} units in stock.`,
            }
          });
        }
        setLoading(false);
      }

      React.useEffect(() => { runMatrix(); }, []);

      const cr = customResult;
      const expl = cr?.explanation;

      return (

              <input type="number" value={basePrice} onChange={e => setBasePrice(+e.target.value || 1000)} min={10} max={10000}

                style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", fontFamily: "DM Mono, monospace" }} />
            </div>
            <button onClick={runMatrix} disabled={loading}
              className="px-5 py-2.5 rounded-xl font-semibold text-[13px] border-none cursor-pointer transition-all"

              {loading ? "Running…" : "⚡ Run Simulation"}

          </div>

          {simData && (
            <div className="overflow-x-auto rounded-2xl mb-8" data-aos="fade-up"

              <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "Outfit, sans-serif" }}>
                <thead>
                  <tr style={{ borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
                    {["Scenario", "Demand", "Inventory", "Final Price", "Adjustment", "Tier", "Step 22 — Why?"].map(h => (
                      <th key={h} style={{ padding: "12px 16px", textAlign: "left", fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", color: "rgba(255,255,255,0.35)", textTransform: "uppercase" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {simData.scenarios.map((s, i) => {
                    const adj = s.adjustment_pct;
                    const tColor = TIER_COLORS[s.tier] || "#fff";
                    const isUp = adj > 0;
                    return (
                      <tr key={i}
                        onClick={() => setSelectedExp(selectedExp === i ? null : i)}
                        style={{
                          borderBottom: "1px solid rgba(255,255,255,0.04)", cursor: "pointer",
                          background: selectedExp === i ? "rgba(226,185,111,0.06)" : "transparent",
                          transition: "background 0.2s"
                        }}
                        onMouseEnter={e => { if (selectedExp !== i) e.currentTarget.style.background = "rgba(255,255,255,0.025)"; }}
                        onMouseLeave={e => { if (selectedExp !== i) e.currentTarget.style.background = "transparent"; }}>
                        <td style={{ padding: "14px 16px", fontSize: 13, fontWeight: 600, color: "rgba(255,255,255,0.85)" }}>

                        </td>
                        <td style={{ padding: "14px 16px" }}>
                          <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 8, height: 6, width: 80, overflow: "hidden" }}>
                            <div style={{
                              height: "100%", borderRadius: 8, width: `${Math.min(s.demand_score, 100)}%`,
                              background: s.demand_score > 60 ? "#ff4757" : s.demand_score > 35 ? "#ffa502" : "#2ed573"

                          </div>
                          <span style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", marginTop: 3, display: "block" }}>{s.demand_score}/100</span>

                        <td style={{ padding: "14px 16px", fontSize: 12, color: "rgba(255,255,255,0.6)", fontFamily: "DM Mono, monospace" }}>
                          {s.inventory >= 1000 ? `${(s.inventory / 1000).toFixed(1)}k` : s.inventory} units
                        </td>
                        <td style={{ padding: "14px 16px" }}>
                          <span style={{ fontSize: 15, fontWeight: 700, fontFamily: "DM Mono, monospace", color: isUp ? "#4ade80" : "#f87171" }}>
                            ${s.final_price?.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                          </span>
                          <span style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", display: "block" }}>
                            base ${s.base_price?.toFixed(0) || simData.base_price}
                          </span>
                        </td>
                        <td style={{ padding: "14px 16px" }}>
                          <span style={{ fontSize: 13, fontWeight: 700, color: isUp ? "#4ade80" : "#f87171" }}>
                            {adj >= 0 ? "▲" : "▼"} {Math.abs(adj).toFixed(1)}%
                          </span>
                        </td>
                        <td style={{ padding: "14px 16px" }}>
                          <span style={{
                            fontSize: 10, fontWeight: 700, padding: "3px 10px", borderRadius: 999,
                            background: tColor + "22", color: tColor, border: `1px solid ${tColor}44`, textTransform: "uppercase", letterSpacing: "0.08em"
                          }}>
                            {s.tier}
                          </span>
                        </td>
                        <td style={{ padding: "14px 16px", fontSize: 11, color: "rgba(255,255,255,0.5)", maxWidth: 240 }}>
                          {s.reasons?.slice(0, 2).join(" | ")}
                          <span style={{ color: "rgba(226,185,111,0.5)", marginLeft: 6, fontSize: 9 }}>
                            {selectedExp === i ? "▲ hide" : "▼ details"}
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>

              {/* Expanded explainability row */}
              {selectedExp !== null && simData.scenarios[selectedExp]?.explanation && (
                <div style={{ padding: "20px 24px", borderTop: "1px solid rgba(226,185,111,0.15)", background: "rgba(226,185,111,0.04)" }}
                  data-aos="fade-in">
                  <ExplanationCard exp={simData.scenarios[selectedExp].explanation} />
                </div>
              )}
            </div>
          )}

          {/* Custom Simulator */}
          <div className="grid lg:grid-cols-2 gap-6" data-aos="fade-up">
            <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 20, padding: 24 }}>
              <p className="text-[14px] font-bold mb-5 m-0" style={{ color: "rgba(255,255,255,0.9)" }}>
                🎛️ Custom Scenario Simulator
              </p>
              <SliderRow label="Demand Score" value={demand} min={0} max={100} onChange={setDemand}
                color={demand > 60 ? "#ff4757" : demand > 35 ? "#ffa502" : "#2ed573"}
                suffix="/100" />
              <SliderRow label="Inventory" value={inventory} min={0} max={1000} onChange={setInventory}
                color={inventory < 20 ? "#ff4757" : inventory > 300 ? "#2ed573" : "#ffa502"}
                suffix=" units" />
              <SliderRow label="User Intent" value={intent} min={0} max={30} onChange={setIntent}
                color="#a78bfa" suffix=" pts" />
              <button onClick={runCustom} disabled={loading}
                className="w-full py-3 rounded-xl font-semibold text-[13px] mt-2 border-none cursor-pointer transition-all"
                style={{ background: "linear-gradient(135deg,#7c3aed,#5b21b6)", color: "#fff", opacity: loading ? 0.6 : 1 }}>
                {loading ? "Computing…" : "🧠 Get AI Price Decision"}
              </button>
            </div>

            {/* Custom result + explanation */}
            {cr ? (
              <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 20, padding: 24 }}>
                <div className="flex items-start gap-3 mb-4">
                  <div style={{ background: (TIER_COLORS[cr.tier] || "#fff") + "22", borderRadius: 12, padding: "10px 14px", flex: "0 0 auto" }}>
                    <span style={{ fontSize: 22, fontWeight: 800, fontFamily: "DM Mono, monospace", color: cr.adjustment_pct >= 0 ? "#4ade80" : "#f87171" }}>
                      ${cr.final_price?.toFixed(2)}
                    </span>
                    <p style={{ fontSize: 10, margin: "2px 0 0", color: "rgba(255,255,255,0.4)" }}>
                      {cr.adjustment_pct >= 0 ? "▲" : "▼"} {Math.abs(cr.adjustment_pct).toFixed(1)}% from ${cr.base_price}
                    </p>
                  </div>
                  <div>
                    {expl && (
                      <span style={{
                        fontSize: 10, fontWeight: 700, padding: "3px 10px", borderRadius: 999,
                        background: (expl.badge_color || "#fff") + "22", color: expl.badge_color || "#fff",
                        border: `1px solid ${expl.badge_color || "#fff"}44`
                      }}>
                        {expl.badge}
                      </span>
                    )}
                    {expl && <p style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", marginTop: 8, lineHeight: 1.5 }}>{expl.headline}</p>}
                  </div>
                </div>
                {expl?.factors?.map((f, fi) => (
                  <div key={fi} className="flex items-center gap-3 mb-2">
                    <span style={{ fontSize: 14, width: 20, textAlign: "center" }}>{f.icon}</span>
                    <span style={{ fontSize: 11, color: "rgba(255,255,255,0.5)", flex: 1 }}>{f.label}</span>
                    <span style={{ fontSize: 11, fontWeight: 600, color: f.color }}>{f.value}</span>

                      fontSize: 9, padding: "1px 7px", borderRadius: 999,
                      background: f.impact === "positive" ? "rgba(74,222,128,0.12)" : f.impact === "negative" ? "rgba(248,113,113,0.12)" : "rgba(255,255,255,0.06)",

                  </div>

                  <p style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", lineHeight: 1.6, marginTop: 10, paddingTop: 10, borderTop: "1px solid rgba(255,255,255,0.06)" }}>
                    {expl.summary}
                  </p>
                )}

                  <p style={{ fontSize: 10, color: "#a78bfa", marginTop: 6, fontStyle: "italic" }}>
                    {expl.challenge_note}
                  </p>
                )}
              </div>

              <div style={{
                background: "rgba(255,255,255,0.02)", border: "1px dashed rgba(255,255,255,0.07)", borderRadius: 20, padding: 24,
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, minHeight: 200
              }}>

    /* ─────────────── THREE.JS INIT ─────────────── */

    function initThree(canvas) {
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
      camera.position.z = 5;

      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      renderer.setClearColor(0x000000, 0);

      // Particles
      const particleCount = 200;
      const positions = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);

      for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 20;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
        sizes[i] = Math.random() * 3 + 1;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setAttribute("size", new THREE.BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        color: 0xe2b96f,
        size: 0.06,
        transparent: true,
        opacity: 0.45,
        sizeAttenuation: true,
      });

      const particles = new THREE.Points(geo, mat);
      scene.add(particles);

      // Floating geometric shapes
      const shapes = [];
      const shapeGeo = [
        new THREE.TetrahedronGeometry(0.3),
        new THREE.OctahedronGeometry(0.25),
        new THREE.IcosahedronGeometry(0.22),
      ];
      const shapeMat = new THREE.MeshBasicMaterial({
        color: 0xe2b96f,
        wireframe: true,
        transparent: true,
        opacity: 0.15,
      });

      for (let i = 0; i < 8; i++) {
        const mesh = new THREE.Mesh(shapeGeo[i % shapeGeo.length], shapeMat);
        mesh.position.set(
          (Math.random() - 0.5) * 16,
          (Math.random() - 0.5) * 10,
          (Math.random() - 0.5) * 5
        );
        mesh.userData = {
          rotX: (Math.random() - 0.5) * 0.01,
          rotY: (Math.random() - 0.5) * 0.01,
          floatSpeed: Math.random() * 0.003 + 0.001,
          floatOffset: Math.random() * Math.PI * 2,
        };
        scene.add(mesh);
        shapes.push(mesh);
      }

      let frame = 0;
      let animId;

      function animate() {
        animId = requestAnimationFrame(animate);
        frame++;

        particles.rotation.y = frame * 0.0003;
        particles.rotation.x = frame * 0.0001;

        shapes.forEach((s) => {
          s.rotation.x += s.userData.rotX;
          s.rotation.y += s.userData.rotY;
          s.position.y += Math.sin(frame * s.userData.floatSpeed + s.userData.floatOffset) * 0.003;
        });

        renderer.render(scene, camera);
      }
      animate();

      function onResize() {
        const w = canvas.clientWidth, h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
      window.addEventListener("resize", onResize);

      return () => {
        cancelAnimationFrame(animId);
        window.removeEventListener("resize", onResize);
        renderer.dispose();
      };
    }

    function App() {

      const [loading, setLoading] = useState(false);
